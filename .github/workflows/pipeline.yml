name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint source
        run: ruff check streaming/ kafka/ adapters/ evaluation/ scripts/ --ignore E501

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate core imports
        run: |
          python -c "from streaming.drift_detector import DriftDetector; print('OK DriftDetector')"
          python -c "from streaming.executor import StreamingExecutor; print('OK StreamingExecutor')"
          python -c "from evaluation.metrics import DriftMetrics; print('OK DriftMetrics')"

      - name: Run evaluation metrics unit tests
        run: python -m pytest evaluation/ -v --tb=short -q

  integration:
    name: Integration — Kafka
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - name: Start Kafka stack
        run: docker compose up -d kafka zookeeper
        timeout-minutes: 2

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Kafka
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T kafka kafka-topics.sh \
              --bootstrap-server localhost:9092 --list &>/dev/null && break
            sleep 2
          done

      - name: Create topics
        run: python kafka/ensure_topics.py

      - name: Run smoke evaluation
        run: python scripts/run_demo.py

      - name: Tear down
        if: always()
        run: docker compose down -v

  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Validate compose file
        run: docker compose config -q

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [integration, docker-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
